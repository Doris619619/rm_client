# ============================================================
# 裁判系统数据接收节点配置
# 功能：从比赛裁判系统接收数据（如机器人状态、比赛信息等）
# ============================================================
judge_receiver:
  ros__parameters:
    # MQTT服务器地址配置
    # tcp:// 表示使用TCP协议连接
    # 127.0.0.1 表示连接到本地主机（即本机）
    # 1883 是MQTT协议的默认端口号
    server_uri: "tcp://127.0.0.1:1883"
    
    # MQTT客户端标识符
    # 用于在MQTT服务器上唯一标识这个客户端
    # 命名规范：rm(机器人比赛) + client(客户端) + receiver(接收端)
    client_id: "rm_client_receiver"
    
    # MQTT服务质量等级
    # 0: 最多一次传输（可能丢失）
    # 1: 至少一次传输（保证送达，可能有重复）
    # 2: 恰好一次传输（保证送达且不重复）
    # 这里选择1，在可靠性和性能之间取得平衡
    qos: 1
    
    # ROS话题名称前缀
    # 接收到的MQTT消息会被转换为ROS话题，话题名称以这个前缀开头
    # 例如：/judge/robot_status, /judge/game_state 等
    ros_prefix: "/judge"

# ============================================================
# 裁判系统数据发送节点配置
# 功能：向比赛裁判系统发送控制指令（如机器人操作命令）
# ============================================================
judge_sender:
  ros__parameters:
    # MQTT服务器地址配置（与接收节点相同）
    server_uri: "tcp://127.0.0.1:1883"
    
    # MQTT客户端标识符
    # 用于在MQTT服务器上唯一标识这个客户端
    # sender表示这是发送端
    client_id: "rm_client_sender"
    
    # MQTT服务质量等级
    # 发送命令需要保证可靠性，所以选择1级
    qos: 1
    
    # ROS命令话题名称
    # 节点会订阅这个ROS话题，获取要发送的命令
    # /semi_auto/command_id 表示这是半自动模式下的命令话题
    ros_command_topic: "/semi_auto/command_id"

# ============================================================
# 半自动键盘控制节点配置
# 功能：通过键盘输入控制机器人（半自动模式）
# ============================================================
semi_auto_keyboard:
  ros__parameters:
    # ROS命令发布话题
    # 键盘输入会被转换为控制命令，发布到这个话题上
    # judge_sender节点会订阅这个相同的话题来发送命令
    ros_command_topic: "/semi_auto/command_id"
    
    # 命令发送速率限制（毫秒）
    # 1000ms = 1秒
    # 限制命令发送的最大频率，防止：
    # 1. 网络拥塞
    # 2. 裁判系统处理过载
    # 3. 误操作导致命令风暴
    rate_limit_ms: 1000